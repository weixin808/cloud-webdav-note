<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>安卓精简记事本-删除修复稳版</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box;font-family:system-ui,Microsoft YaHei;
            -webkit-tap-highlight-color: transparent;
        }
        :root{
            --body-bg:#f5f7fa;
            --text-color:#333;
            --input-bg:#fff;
            --input-border:#ddd;
            --item-bg:#fff;
            --shadow-color:rgba(0,0,0.1);
            --mask-bg:rgba(80,80,80,0.35);
        }
        .dark-mode{
            --body-bg:#1a1a1a;
            --text-color:#eee;
            --input-bg:#2d2d2d;
            --input-border:#444;
            --item-bg:#2d2d2d;
            --shadow-color:rgba(0,0.3);
            --mask-bg:rgba(0,0,0.25);
        }
        body{
            background:var(--body-bg);
            color:var(--text-color);
            padding:15px;
            max-width:100%;
            min-height:100vh;
            transition: background 0.3s, color 0.3s;
        }
        .title-set-row{
            display:flex;
            gap:10px;
            align-items:center;
            margin-bottom:15px;
        }
        #noteTitle{
            flex:1;
            padding:0 14px;
            background:var(--input-bg);
            color:var(--text-color);
            border:1px solid var(--input-border);
            border-radius:6px;
            font-size:16px;
            height:48px;
            line-height:48px;
        }
        .top-right-btn{
            height:48px;
            padding:0 16px;
            background:#27ae60;
            color:#fff;
            border:none;
            border-radius:6px;
            font-size:14px;
            line-height:48px;
            flex-shrink:0;
            box-shadow:0 4px 0 #1e8449,0 6px 8px rgba(0,0,0.15);
            transition:all 0.1s ease;
            cursor:pointer;
        }
        .top-right-btn:active{
            transform:translateY(2px);
            box-shadow:0 2px 0 #1e8449,0 3px 4px rgba(0,0,0.15);
        }
        .save-wrap{
            margin-bottom:15px;
        }
        .btn{
            width:100%;
            padding:12px 8px;
            background:#4096ff;
            color:#fff;
            border:none;
            border-radius:6px;
            cursor:pointer;
            font-size:15px;
            text-align:center;
            box-shadow:0 4px 0 #267ddd,0 6px 8px rgba(0,0,0.15);
            transition:all 0.1s ease;
        }
        .btn:active{
            transform:translateY(2px);
            box-shadow:0 2px 0 #267ddd,0 3px 4px rgba(0,0,0.15);
        }
        #noteContent{
            width:100%;
            height:280px;
            padding:14px;
            background:var(--input-bg);
            color:var(--text-color);
            border:1px solid var(--input-border);
            border-radius:6px;
            font-size:16px;
            resize:vertical;
            line-height:1.6;
            margin-bottom:15px
        }
        .history-container{
            margin-top:10px;
        }
        .history-toggle-btn{
            width:100%;
            padding:12px 8px;
            background:#9b59b6;
            color:#fff;
            border:none;
            border-radius:6px;
            cursor:pointer;
            font-size:15px;
            text-align:center;
            box-shadow:0 4px 0 #7d3c98,0 6px 8px rgba(0,0,0.15);
            transition:all 0.1s ease;
            margin-bottom:10px;
        }
        .history-toggle-btn:active{
            transform:translateY(2px);
            box-shadow:0 2px 0 #7d3c98,0 3px 4px rgba(0,0,0.15);
        }
        .history-list-wrap{
            display:none;
        }
        .history-list-wrap.show{
            display:block;
        }
        .note-item{
            padding:12px 16px;
            background:var(--item-bg);
            border-radius:6px;
            margin-bottom:10px;
            display:flex;
            justify-content:space-between;
            align-items:center;
            box-shadow:0 1px 3px var(--shadow-color);
            cursor:pointer;
        }
        .note-info{
            flex:1;
            cursor:pointer;
            background:transparent !important;
        }
        .note-info:active, .note-item:active{
            background:transparent !important;
        }
        .note-title{font-weight:bold;margin-bottom:4px;color:var(--text-color);font-size:16px}
        .note-time{font-size:12px;color:#888}
        .delete-btn{
            padding:8px 10px;
            background:#ff4d4f;
            color:#fff;
            border:none;
            border-radius:4px;
            cursor:pointer;
            font-size:14px;
            box-shadow:0 3px 0 #d9363e,0 4px 6px rgba(0,0,0.12);
            transition:all 0.1s ease;
        }
        .delete-btn:active{
            transform:translateY(2px);
            box-shadow:0 1px 0 #d9363e,0 2px 3px rgba(0,0,0.12);
        }
        h3{display:none;}
        .toast{
            position:fixed;
            top:50%;
            left:50%;
            transform:translate(-50%,-50%);
            background:rgba(0,0,0,0.75);
            color:#fff;
            padding:10px 20px;
            border-radius:6px;
            font-size:15px;
            z-index:9999;
            display:none;
        }
        .confirm-mask{
            position:fixed;
            inset:0;
            background:var(--mask-bg);
            backdrop-filter: blur(6px);
            -webkit-backdrop-filter: blur(6px);
            display:none;
            align-items:center;
            justify-content:center;
            z-index:9998;
        }
        .confirm-box{
            background:var(--item-bg);
            color:var(--text-color);
            border-radius:8px;
            width:80%;
            max-width:300px;
            padding:20px;
        }
        .confirm-text{
            font-size:16px;
            color:var(--text-color);
            text-align:center;
            margin-bottom:20px;
            line-height:1.5;
        }
        .confirm-btn-group{
            display:flex;
            gap:10px;
        }
        .confirm-cancel{
            flex:1;
            padding:10px;
            border:none;
            border-radius:6px;
            font-size:15px;
            cursor:pointer;
            background:#eee;
            color:#333;
            box-shadow:0 3px 0 #cccccc,0 4px 6px rgba(0,0,0.1);
            transition:all 0.1s ease;
        }
        .confirm-cancel:active{
            transform:translateY(2px);
            box-shadow:0 1px 0 #cccccc,0 2px 3px rgba(0,0,0.1);
        }
        .dark-mode .confirm-cancel{
            background:#444;
            color:#eee;
            box-shadow:0 3px 0 #333333,0 4px 6px rgba(0,0.2);
        }
        .dark-mode .confirm-cancel:active{
            box-shadow:0 1px 0 #333333,0 2px 3px rgba(0,0.2);
        }
        .confirm-ok{
            flex:1;
            padding:10px;
            border:none;
            border-radius:6px;
            font-size:15px;
            cursor:pointer;
            background:#ff4d4f;
            color:#fff;
            box-shadow:0 3px 0 #d9363e,0 4px 6px rgba(0,0.12);
            transition:all 0.1s ease;
        }
        .confirm-ok:active{
            transform:translateY(2px);
            box-shadow:0 1px 0 #d9363e,0 2px 3px rgba(0,0.12);
        }
        .edit-mask{
            position:fixed;
            inset:0;
            background:var(--mask-bg);
            backdrop-filter: blur(6px);
            -webkit-backdrop-filter: blur(6px);
            display:none;
            align-items:center;
            justify-content:center;
            z-index:9997;
            padding:15px;
            overflow-y:auto;
        }
        .edit-box{
            background:var(--item-bg);
            border-radius:8px;
            width:100%;
            max-width:400px;
            padding:15px;
        }
        .edit-title-input{
            width:100%;
            padding:0 12px;
            background:var(--input-bg);
            color:var(--text-color);
            border:1px solid var(--input-border);
            border-radius:6px;
            font-size:16px;
            margin-bottom:10px;
            height:48px;
            line-height:48px;
        }
        .edit-content-textarea{
            width:100%;
            min-height:580px;
            padding:12px;
            background:var(--input-bg);
            color:var(--text-color);
            border:1px solid var(--input-border);
            border-radius:6px;
            font-size:16px;
            line-height:1.6;
            resize:vertical;
            margin-bottom:15px;
        }
        .edit-btn-group{
            display:flex;
            gap:10px;
        }
        .edit-save-btn{
            flex:1;
            padding:10px;
            background:#4096ff;
            color:#fff;
            border:none;
            border-radius:6px;
            font-size:15px;
            cursor:pointer;
            box-shadow:0 3px 0 #267ddd,0 4px 6px rgba(0,0.15);
            transition:all 0.1s ease;
        }
        .edit-save-btn:active{
            transform:translateY(2px);
            box-shadow:0 1px 0 #267ddd,0 2px 3px rgba(0,0.15);
        }
        .edit-close-btn{
            flex:1;
            padding:10px;
            background:#eee;
            color:#333;
            border:none;
            border-radius:6px;
            font-size:15px;
            cursor:pointer;
            box-shadow:0 3px 0 #cccccc,0 4px 6px rgba(0,0.1);
            transition:all 0.1s ease;
        }
        .edit-close-btn:active{
            transform:translateY(2px);
            box-shadow:0 1px 0 #cccccc,0 2px 3px rgba(0,0.1);
        }
        .dark-mode .edit-close-btn{
            background:#444;
            color:#eee;
            box-shadow:0 3px 0 #333333,0 4px 6px rgba(0,0.2);
        }
        .dark-mode .edit-close-btn:active{
            box-shadow:0 1px 0 #333333,0 2px 3px rgba(0,0.2);
        }
        .setting-mask{
            position:fixed;
            inset:0;
            background:var(--mask-bg);
            backdrop-filter: blur(6px);
            -webkit-backdrop-filter: blur(6px);
            display:none;
            align-items:center;
            justify-content:center;
            z-index:10000;
            padding:15px;
            overflow-y:auto;
        }
        .setting-box{
            background:var(--item-bg);
            color:var(--text-color);
            border-radius:8px;
            width:100%;
            max-width:400px;
            padding:20px;
        }
        .setting-title{
            font-size:18px;
            font-weight:bold;
            text-align:center;
            margin-bottom:20px;
        }
        .dark-switch-row{
            display:flex;
            justify-content:space-between;
            align-items:center;
            padding:15px 0;
            border-bottom:1px solid var(--input-border);
            font-size:16px;
        }
        .webdav-set-row{
            padding:15px 0;
            border-bottom:1px solid var(--input-border);
        }
        .webdav-input{
            width:100%;
            margin:6px 0;
            padding:10px;
            background:var(--input-bg);
            color:var(--text-color);
            border:1px solid var(--input-border);
            border-radius:6px;
            font-size:15px;
        }
        .backup-cloud-btn{
            width:100%;
            margin:8px 0;
            padding:12px;
            background:#27ae60;
            color:#fff;
            border:none;
            border-radius:6px;
            font-size:15px;
            cursor:pointer;
            box-shadow:0 4px 0 #1e8449,0 6px 8px rgba(0,0.15);
            transition:all 0.1s ease;
        }
        .backup-cloud-btn:active{
            transform:translateY(2px);
            box-shadow:0 2px 0 #1e8449,0 3px 4px rgba(0,0.15);
        }
        .restore-cloud-btn{
            width:100%;
            margin:8px 0;
            padding:12px;
            background:#e67e22;
            color:#fff;
            border:none;
            border-radius:6px;
            font-size:15px;
            cursor:pointer;
            box-shadow:0 4px 0 #c06b1b,0 6px 8px rgba(0,0.15);
            transition:all 0.1s ease;
        }
        .restore-cloud-btn:active{
            transform:translateY(2px);
            box-shadow:0 2px 0 #c06b1b,0 3px 4px rgba(0,0.15);
        }
        .local-backup-btn{
            width:100%;
            margin:8px 0;
            padding:12px;
            background:#3498db;
            color:#fff;
            border:none;
            border-radius:6px;
            font-size:15px;
            cursor:pointer;
            box-shadow:0 4px 0 #217dbb,0 6px 8px rgba(0,0.15);
            transition:all 0.1s ease;
        }
        .local-backup-btn:active{
            transform:translateY(2px);
            box-shadow:0 2px 0 #217dbb,0 3px 4px rgba(0,0.15);
        }
        .local-restore-paste-btn{
            width:100%;
            margin:8px 0;
            padding:12px;
            background:#9b59b6;
            color:#fff;
            border:none;
            border-radius:6px;
            font-size:15px;
            cursor:pointer;
            box-shadow:0 4px 0 #7d3c98,0 6px 8px rgba(0,0.15);
            transition:all 0.1s ease;
        }
        .local-restore-paste-btn:active{
            transform:translateY(2px);
            box-shadow:0 2px 0 #7d3c98,0 3px 4px rgba(0,0.15);
        }
        .paste-restore-textarea{
            width:100%;
            min-height:180px;
            padding:12px;
            margin:8px 0;
            border:1px solid var(--input-border);
            border-radius:6px;
            font-size:14px;
        }
        .switch{
            width:50px;
            height:26px;
            background:#ccc;
            border-radius:13px;
            position:relative;
            cursor:pointer;
            transition:background 0.3s;
        }
        .switch::after{
            content:'';
            position:absolute;
            width:22px;
            height:22px;
            background:#fff;
            border-radius:50%;
            top:2px;
            left:2px;
            transition:left 0.3s;
        }
        .switch.active{
            background:#4096ff;
        }
        .switch.active::after{
            left:26px;
        }
        .setting-close-btn{
            width:100%;
            margin-top:20px;
            padding:12px;
            background:#4096ff;
            color:#fff;
            border:none;
            border-radius:6px;
            font-size:15px;
            cursor:pointer;
            box-shadow:0 4px 0 #267ddd,0 6px 8px rgba(0,0.15);
            transition:all 0.1s ease;
        }
        .setting-close-btn:active{
            transform:translateY(2px);
            box-shadow:0 2px 0 #267ddd,0 3px 4px rgba(0,0.15);
        }
        #copyTextarea{
            position:absolute;
            left:-9999px;
            top:0;
        }
    </style>
</head>
<body>
    <div class="title-set-row">
        <input type="text" id="noteTitle" placeholder="输入笔记标题">
        <button class="top-right-btn" id="topRightBtn">设置</button>
    </div>

    <textarea id="noteContent" placeholder="在这里输入笔记详细内容..."></textarea>
    <div class="save-wrap">
        <button class="btn" id="saveBtn">保存</button>
    </div>

    <div class="history-container">
        <button class="history-toggle-btn" id="historyToggleBtn">历史笔记</button>
        <div class="history-list-wrap" id="historyListWrap">
            <div id="noteList"></div>
        </div>
    </div>

    <div class="toast" id="toast"></div>
    <textarea id="copyTextarea"></textarea>
    <div class="confirm-mask" id="confirmMask">
        <div class="confirm-box">
            <div class="confirm-text">确认删除</div>
            <div class="confirm-btn-group">
                <button class="confirm-cancel" id="confirmCancel">取消</button>
                <button class="confirm-ok" id="confirmOk">确定</button>
            </div>
        </div>
    </div>
    <div class="edit-mask" id="editMask">
        <div class="edit-box">
            <input class="edit-title-input" id="editTitle" placeholder="修改笔记标题">
            <textarea class="edit-content-textarea" id="editContent" placeholder="修改笔记内容"></textarea>
            <div class="edit-btn-group">
                <button class="edit-save-btn" id="editSaveBtn">保存修改</button>
                <button class="edit-close-btn" id="editCloseBtn">关闭</button>
            </div>
        </div>
    </div>
    <div class="setting-mask" id="settingMask">
        <div class="setting-box">
            <div class="setting-title">设置中心</div>
            <div class="dark-switch-row">
                <span>暗黑模式</span>
                <div class="switch" id="darkSwitch"></div>
            </div>
            <div class="webdav-set-row">
                <input class="webdav-input" id="davUrlInput" placeholder="坚果云WebDAV地址：https://dav.jianguoyun.com/dav/note_backup/">
                <input class="webdav-input" id="davUserInput" placeholder="坚果云登录邮箱(WebDAV用户名)">
                <input class="webdav-input" id="davPwdInput" type="password" placeholder="坚果云应用密码(WebDAV密码)">
                <button class="backup-cloud-btn" id="uploadToNutBtn">一键备份笔记上传至坚果云</button>
                <button class="restore-cloud-btn" id="restoreFromNutBtn">从坚果云备份还原笔记</button>
                <button class="local-backup-btn" id="localBackupBtn">备份笔记到本地（复制备份文本）</button>
                <textarea class="paste-restore-textarea" id="pasteRestoreArea" placeholder="粘贴之前复制的笔记备份JSON文本，再执行导入恢复"></textarea>
                <button class="local-restore-paste-btn" id="pasteRestoreBtn">粘贴备份文本导入恢复笔记</button>
            </div>
            <button class="setting-close-btn" id="settingCloseBtn">返回主页</button>
        </div>
    </div>

    <script>
        const titleInput = document.getElementById('noteTitle');
        const contentInput = document.getElementById('noteContent');
        const saveBtn = document.getElementById('saveBtn');
        const noteList = document.getElementById('noteList');
        const toast = document.getElementById('toast');
        const confirmMask = document.getElementById('confirmMask');
        const confirmCancel = document.getElementById('confirmCancel');
        const confirmOk = document.getElementById('confirmOk');
        const editMask = document.getElementById('editMask');
        const editTitle = document.getElementById('editTitle');
        const editContent = document.getElementById('editContent');
        const editSaveBtn = document.getElementById('editSaveBtn');
        const editCloseBtn = document.getElementById('editCloseBtn');
        const topRightBtn = document.getElementById('topRightBtn');
        const settingMask = document.getElementById('settingMask');
        const settingCloseBtn = document.getElementById('settingCloseBtn');
        const darkSwitch = document.getElementById('darkSwitch');
        const uploadToNutBtn = document.getElementById('uploadToNutBtn');
        const restoreFromNutBtn = document.getElementById('restoreFromNutBtn');
        const davUrlInput = document.getElementById('davUrlInput');
        const davUserInput = document.getElementById('davUserInput');
        const davPwdInput = document.getElementById('davPwdInput');
        const bodyDom = document.body;
        const historyToggleBtn = document.getElementById('historyToggleBtn');
        const historyListWrap = document.getElementById('historyListWrap');
        const localBackupBtn = document.getElementById('localBackupBtn');
        const pasteRestoreBtn = document.getElementById('pasteRestoreBtn');
        const pasteRestoreArea = document.getElementById('pasteRestoreArea');
        const copyTextarea = document.getElementById('copyTextarea');

        let deleteIndex = null; // 单独记录待删除下标（替换原resolveDelete变量，修复异步绑定失效问题）

        let darkModeOn = localStorage.getItem('darkMode') === 'on';
        if(darkModeOn){
            bodyDom.classList.add('dark-mode');
            darkSwitch.classList.add('active');
        }
        davUrlInput.value = localStorage.getItem('nut_dav_url') || 'https://dav.jianguoyun.com/dav/note_backup/';
        davUserInput.value = localStorage.getItem('nut_dav_user') || '';
        davPwdInput.value = localStorage.getItem('nut_dav_pwd') || '';

        historyToggleBtn.addEventListener('click',()=>{
            historyListWrap.classList.toggle('show');
        })

        function showToast(msg){
            toast.textContent = msg;
            toast.style.display = 'block';
            setTimeout(()=>{
                toast.style.display = 'none';
            },2000);
        }

        // 取消弹窗：关闭清空下标
        confirmCancel.onclick = ()=>{
            confirmMask.style.display = 'none';
            deleteIndex = null;
        }
        // 确定删除：执行删除逻辑
        confirmOk.onclick = ()=>{
            if(deleteIndex !== null){
                const list = getNotes();
                list.splice(deleteIndex,1);
                saveNotes(list);
                showToast('删除成功');
            }
            confirmMask.style.display = 'none';
            deleteIndex = null;
        }

        editCloseBtn.onclick = ()=>{
            editMask.style.display = 'none';
        }
        function openEditModal(index, noteData){
            editTitle.value = noteData.title;
            editContent.value = noteData.content;
            editMask.style.display = 'flex';
        }
        editSaveBtn.onclick = ()=>{
            const newTitle = editTitle.value.trim();
            const newContent = editContent.value.trim();
            if(!newTitle || !newContent){
                showToast('标题和内容不能为空');
                return;
            }
            const notesList = getNotes();
            notesList[deleteIndex !== null ? deleteIndex : notesList.length] = {
                title: newTitle,
                content: newContent,
                time: new Date().toLocaleString()
            };
            saveNotes(notesList);
            editMask.style.display = 'none';
            showToast('修改保存成功');
        }
        function getNotes(){
            return JSON.parse(localStorage.getItem('myNotes')) || [];
        }
        function saveNotes(list){
            localStorage.setItem('myNotes',JSON.stringify(list));
            renderNotes();
        }
        function renderNotes(){
            const list = getNotes();
            noteList.innerHTML = '';
            list.forEach((item,index)=>{
                const div = document.createElement('div');
                div.className = 'note-item';
                const infoDiv = document.createElement('div');
                infoDiv.className = 'note-info';
                infoDiv.innerHTML = `<div class="note-title">${item.title}</div><div class="note-time">${item.time}</div>`;
                infoDiv.onclick = function(){
                    openEditModal(index, item);
                }
                const delBtn = document.createElement('button');
                delBtn.className = 'delete-btn';
                delBtn.textContent = '删除';
                delBtn.onclick = function(e){
                    e.stopPropagation();
                    // 点击删除按钮：记录下标、弹出确认框
                    deleteIndex = index;
                    confirmMask.style.display = 'flex';
                }
                div.appendChild(infoDiv);
                div.appendChild(delBtn);
                noteList.appendChild(div);
            })
        }
        saveBtn.addEventListener('click',()=>{
            const title = titleInput.value.trim();
            const content = contentInput.value.trim();
            if(!title || !content){
                showToast('标题和内容不能为空');
                return;
            }
            const now = new Date().toLocaleString();
            const newNote = {title,content,time:now};
            const list = getNotes();
            list.unshift(newNote);
            saveNotes(list);
            titleInput.value = '';
            contentInput.value = '';
            showToast('保存成功');
        })
        topRightBtn.addEventListener('click',()=>{
            settingMask.style.display = 'flex';
        })
        settingCloseBtn.addEventListener('click',()=>{
            settingMask.style.display = 'none';
        })
        darkSwitch.addEventListener('click',()=>{
            darkModeOn = !darkModeOn;
            if(darkModeOn){
                bodyDom.classList.add('dark-mode');
                darkSwitch.classList.add('active');
                localStorage.setItem('darkMode','on');
            }else{
                bodyDom.classList.remove('dark-mode');
                darkSwitch.classList.remove('active');
                localStorage.setItem('darkMode','off');
            }
        })
        uploadToNutBtn.addEventListener('click', async ()=>{
            const davUrl = davUrlInput.value.trim();
            const davUser = davUserInput.value.trim();
            const davPwd = davPwdInput.value.trim();
            if(!davUrl || !davUser || !davPwd){
                showToast('请完整填写坚果云WebDAV地址、邮箱、应用密码');
                return;
            }
            localStorage.setItem('nut_dav_url',davUrl);
            localStorage.setItem('nut_dav_user',davUser);
            localStorage.setItem('nut_dav_pwd',davPwd);
            showToast('浏览器跨域限制，已保存配置，本地笔记正常留存');
        })
        restoreFromNutBtn.addEventListener('click', async ()=>{
            const davUrl = davUrlInput.value.trim();
            const davUser = davUserInput.value.trim();
            const davPwd = davPwdInput.value.trim();
            if(!davUrl || !davUser || !davPwd){
                showToast('请完整填写坚果云WebDAV信息');
                return;
            }
            showToast('浏览器跨域限制，还原需后端中转');
        })

        localBackupBtn.addEventListener('click', ()=>{
            const notes = getNotes();
            const jsonStr = JSON.stringify(notes,null,2);
            copyTextarea.value = jsonStr;
            copyTextarea.select();
            document.execCommand('copy');
            showToast('备份文本已复制，可粘贴保存');
        })
        pasteRestoreBtn.addEventListener('click', ()=>{
            const pasteText = pasteRestoreArea.value.trim();
            if(!pasteText){
                showToast('请先粘贴备份JSON文本');
                return;
            }
            try{
                const restoreList = JSON.parse(pasteText);
                if(Array.isArray(restoreList)){
                    saveNotes(restoreList);
                    pasteRestoreArea.value = '';
                    showToast('粘贴导入笔记恢复成功');
                }else{
                    showToast('文本不是有效笔记备份数组');
                }
            }catch(err){
                showToast('JSON解析失败，备份文本有误');
            }
        })

        renderNotes();
    </script>
</body>
</html>
