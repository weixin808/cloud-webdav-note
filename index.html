<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>云同步记事本｜修复右侧滑栏版</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;transition: 0.3s all;}
:root{
    --bg-main:#f0f2f5;
    --bg-sidebar:#ffffff;
    --bg-card:#ffffff;
    --text-primary:#1f2937;
    --text-secondary:#6b7280;
    --text-weak:#9ca3af;
    --border-color:#e5e7eb;
    --primary:#1677ff;
    --success:#00b42a;
    --warning:#ff7d00;
    --danger:#f53f3f;
    --gray:#6b7280;
    --pink:#e64398;
    --shadow:0 2px 12px rgba(0,0,0,0.06);
    --shadow-sidebar:0 2px 8px rgba(0,0,0,0.08);
}
.dark-mode{
    --bg-main:#121212;
    --bg-sidebar:#1e1e1e;
    --bg-card:#252525;
    --text-primary:#f0f0f0;
    --text-secondary:#b0b0b0;
    --text-weak:#888888;
    --border-color:#333333;
}
body{background:var(--bg-main);color:var(--text-primary);min-height:100vh;position:relative;overflow-x:hidden;}
/* 右上角切换按钮 */
.side-toggle{
    position:fixed;
    top:16px;
    right:16px;
    z-index:1000;
    width:44px;
    height:44px;
    border-radius:50%;
    background:var(--primary);
    color:#fff;
    border:none;
    font-size:20px;
    cursor:pointer;
    box-shadow:0 2px 8px rgba(0,0,0,0.15);
}
/* 右侧侧边栏基础样式 */
.right-sidebar{
    position:fixed;
    top:0;
    right:0;
    height:100vh;
    width:260px;
    background:var(--bg-sidebar);
    box-shadow:-2px 0 10px rgba(0,0,0,0.08);
    padding:80px 16px 20px;
    display:flex;
    flex-direction:column;
    gap:14px;
    transform: translateX(100%);
    z-index:999;
}
/* 打开激活类 */
.right-sidebar.open{
    transform: translateX(0);
}
.side-btn{
    width:100%;padding:14px 12px;border:none;border-radius:10px;font-size:16px;text-align:left;cursor:pointer;color:#fff;font-weight:500;
}
.btn-new{background:var(--primary);}
.btn-export{background:var(--success);}
.btn-import{background:var(--warning);}
.btn-sync-upload{background:#9333ea;}
.btn-sync-download{background:#087792;}
.btn-setting{background:#475569;}
.btn-donate{background:var(--pink);}
.btn-theme{background:var(--gray);margin-top:auto;}
/* 主内容区 */
.main-content{
    min-height:100vh;
    padding:80px 20px 40px;
    display:flex;
    flex-direction:column;
}
.sync-status{
    font-size:12px;
    color:var(--primary);
    padding:6px 8px;
    background:rgba(22,119,255,0.08);
    border-radius:6px;
    line-height:16px;
    margin-top:auto;
    margin-bottom:8px;
    text-align:center;
}
.tip-desc{
    font-size:11px;
    color:var(--text-secondary);
    line-height:1.5;
    text-align:center;
    margin-bottom:20px;
}
.note-card{background:var(--bg-card);border-radius:16px;padding:18px;margin-bottom:14px;box-shadow:var(--shadow);}
.note-card .note-title{font-size:19px;font-weight:600;margin-bottom:6px;color:var(--text-primary);}
.note-card .note-time{font-size:13px;color:var(--text-weak);margin-bottom:10px;}
.note-card .note-content{font-size:16px;color:var(--text-secondary);line-height:1.7;word-break:break-all;}
.note-operate{margin-top:14px;display:flex;gap:10px;}
.edit-small-btn{background:var(--gray);color:#fff;border:none;border-radius:8px;padding:8px 16px;font-size:15px;cursor:pointer;}
.del-small-btn{background:var(--danger);color:#fff;border:none;border-radius:8px;padding:8px 16px;font-size:15px;cursor:pointer;}
.mask{position:fixed;inset:0;background:rgba(0,0,0,0.55);display:flex;align-items:center;justify-content:center;padding:16px;display:none;z-index:1001;}
.pop-box{background:var(--bg-sidebar);color:var(--text-primary);border-radius:18px;width:100%;max-width:520px;padding:22px;}
.pop-title{font-size:18px;font-weight:600;text-align:center;margin-bottom:18px;color:var(--text-primary)}
.form-input{width:100%;border:1px solid var(--border-color);background:var(--bg-card);color:var(--text-primary);border-radius:12px;padding:15px;font-size:16px;margin-bottom:14px;outline:none;}
.form-textarea{width:100%;border:1px solid var(--border-color);background:var(--bg-card);color:var(--text-primary);border-radius:12px;padding:15px;font-size:16px;min-height:320px;resize:none;outline:none;margin-bottom:14px;}
.import-textarea{min-height:200px;}
.pop-btn-group{display:flex;gap:12px;margin-top:8px;}
.full-green-btn{width:100%;background:var(--success);color:#fff;border:none;border-radius:12px;padding:14px;font-size:16px;font-weight:500;cursor:pointer;}
.full-gray-btn{width:100%;background:var(--border-color);color:var(--text-primary);border:none;border-radius:12px;padding:14px;font-size:16px;font-weight:500;margin-top:10px;cursor:pointer;}
.donate-qrcode{width:80%;max-width:300px;margin:20px auto;display:block;border-radius:12px;background:#eee;}
.donate-text{text-align:center;line-height:1.7;font-size:15px;color:var(--text-secondary);margin:10px 0;}
@media (max-width:768px){
    .right-sidebar{width:240px;}
    .main-content{padding:76px 16px 30px;}
}
</style>
</head>
<body>
<!-- 右上角切换按钮 -->
<button class="side-toggle" id="toggleSideBtn">☰</button>

<!-- 右侧隐藏操作栏 -->
<div class="right-sidebar" id="rightSideBar">
    <button class="side-btn btn-new" id="addNote">新建笔记</button>
    <button class="side-btn btn-export" id="exportBackup">手动导出备份</button>
    <button class="side-btn btn-import" id="showImport">手动导入恢复</button>
    <button class="side-btn btn-sync-upload" id="syncUpload">一键上传WebDAV云备份</button>
    <button class="side-btn btn-sync-download" id="syncDownload">一键下载WebDAV云端笔记</button>
    <button class="side-btn btn-setting" id="openDavSetting">WebDAV账号设置</button>
    <button class="side-btn btn-donate" id="openDonate">充值赞助</button>
    <button class="side-btn btn-theme" id="toggleTheme">切换暗黑/日间</button>
</div>

<!-- 主笔记内容区 -->
<div class="main-content">
    <div id="noteList"></div>
    <div class="sync-status" id="syncStatus">就绪（联网https环境可正常一键同步）</div>
    <div class="tip-desc">日常编辑自动保存本地｜联网环境可联网坚果云WebDAV同步，手动备份永久可用，点右上角☰打开操作栏</div>
</div>

<!-- 新增/编辑笔记弹窗 -->
<div class="mask" id="editMask">
    <div class="pop-box">
        <input class="form-input" id="titleInp" placeholder="输入笔记标题">
        <textarea class="form-textarea" id="contentInp" placeholder="详细记录笔记内容"></textarea>
        <input type="hidden" id="editIndex">
        <div class="pop-btn-group">
            <button class="full-green-btn" id="saveLocal">保存到本地</button>
        </div>
        <button class="full-gray-btn" id="closeEdit">取消关闭</button>
    </div>
</div>

<!-- 手动导入备份弹窗 -->
<div class="mask" id="importMask">
    <div class="pop-box">
        <div class="pop-title">粘贴云端备份文本手动导入</div>
        <textarea class="form-textarea import-textarea" id="pasteBackupText" placeholder="粘贴坚果云导出的完整备份JSON文本"></textarea>
        <div class="pop-btn-group">
            <button class="full-green-btn" id="confirmImport">确认导入覆盖本地笔记</button>
        </div>
        <button class="full-gray-btn" id="closeImport">取消关闭</button>
    </div>
</div>

<!-- WebDAV账号设置弹窗 -->
<div class="mask" id="davSettingMask">
    <div class="pop-box">
        <div class="pop-title">坚果云WebDAV账号配置</div>
        <input class="form-input" id="davUrl" placeholder="WebDAV地址：https://dav.jianguoyun.com/dav/note_backup/">
        <input class="form-input" id="davUser" placeholder="坚果云注册邮箱">
        <input class="form-input" type="password" id="davPwd" placeholder="坚果云第三方应用密码">
        <div class="pop-btn-group">
            <button class="full-green-btn" id="saveDavConfig">保存账号配置</button>
        </div>
        <button class="full-gray-btn" id="closeDavSetting">取消关闭</button>
    </div>
</div>

<!-- 充值赞助弹窗 -->
<div class="mask" id="donateMask">
    <div class="pop-box">
        <div class="pop-title">扫码充值赞助</div>
        <p class="donate-text">微信/支付宝扫码转账，支持云同步优化升级</p>
        <img class="donate-qrcode" src="替换你的收款公网链接" alt="收款码">
        <p class="donate-text">转账备注可留昵称方便核验权益</p>
        <button class="full-gray-btn" id="closeDonate">关闭弹窗</button>
    </div>
</div>

<script>
// 【修复核心：侧边切换代码单独前置，优先执行】
const toggleSideBtn = document.getElementById('toggleSideBtn');
const rightSideBar = document.getElementById('rightSideBar');
// 点击切换展开/收起
toggleSideBtn.onclick = function(){
    rightSideBar.classList.toggle('open');
    if(rightSideBar.classList.contains('open')){
        toggleSideBtn.textContent = '✕';
    }else{
        toggleSideBtn.textContent = '☰';
    }
}

// 内嵌精简WebDAV客户端
const webdav = {
    createClient: function(url, opts = {}) {
        const baseUrl = url.endsWith('/') ? url : url + '/';
        const authHeader = 'Basic ' + btoa(opts.username + ':' + opts.password);
        const headers = {
            'Authorization': authHeader
        };
        return {
            async exists(path) {
                const res = await fetch(baseUrl + path, { method: 'HEAD', headers });
                return res.ok;
            },
            async putFileContents(path, content, optsPut = {}) {
                const putHeaders = { ...headers };
                if (optsPut.contentType) putHeaders['Content-Type'] = optsPut.contentType;
                await fetch(baseUrl + path, {
                    method: 'PUT',
                    headers: putHeaders,
                    body: content
                });
            },
            async getFileContents(path, optsGet = {}) {
                const res = await fetch(baseUrl + path, { method: 'GET', headers });
                if (!res.ok) throw new Error('坚果云请求异常：'+res.status);
                if (optsGet.format === 'text') return await res.text();
                return await res.blob();
            }
        }
    }
};

// 本地存储KEY
const LOCAL_STORE_NOTE_KEY = 'auto_webdav_sidebar_notes';
const DAV_CONFIG_STORE_KEY = 'webdav_nut_config';
const DAV_CLOUD_FILE_NAME = 'cloud_note_backup.json';
let noteListData = JSON.parse(localStorage.getItem(LOCAL_STORE_NOTE_KEY)) || [];
let davConfigInfo = JSON.parse(localStorage.getItem(DAV_CONFIG_STORE_KEY)) || {url:'',user:'',pwd:''};
if(localStorage.getItem('noteDarkMode') === 'dark') document.body.classList.add('dark-mode');

// DOM绑定
const addNoteBtn = document.getElementById('addNote');
const exportBackupBtn = document.getElementById('exportBackup');
const importBtn = document.getElementById('showImport');
const syncUploadBtn = document.getElementById('syncUpload');
const syncDownloadBtn = document.getElementById('syncDownload');
const openSettingBtn = document.getElementById('openDavSetting');
const toggleDarkBtn = document.getElementById('toggleTheme');
const noteListWrap = document.getElementById('noteList');
const syncStatusText = document.getElementById('syncStatus');
const editMask = document.getElementById('editMask');
const titleInput = document.getElementById('titleInp');
const contentInput = document.getElementById('contentInp');
const editIndexInput = document.getElementById('editIndex');
const saveLocalBtn = document.getElementById('saveLocal');
const closeEditBtn = document.getElementById('closeEdit');
const importMask = document.getElementById('importMask');
const pasteBackupInput = document.getElementById('pasteBackupText');
const confirmImportBtn = document.getElementById('confirmImport');
const closeImportBtn = document.getElementById('closeImport');
const davSettingMask = document.getElementById('davSettingMask');
const davUrlInput = document.getElementById('davUrl');
const davUserInput = document.getElementById('davUser');
const davPwdInput = document.getElementById('davPwd');
const saveDavConfigBtn = document.getElementById('saveDavConfig');
const closeDavSettingBtn = document.getElementById('closeDavSetting');
const openDonateBtn = document.getElementById('openDonate');
const donateMask = document.getElementById('donateMask');
const closeDonateBtn = document.getElementById('closeDonate');

davUrlInput.value = davConfigInfo.url;
davUserInput.value = davConfigInfo.user;
davPwdInput.value = davConfigInfo.pwd;

// 渲染笔记列表
function renderNoteList(){
    noteListWrap.innerHTML = '';
    noteListData.forEach((item, idx)=>{
        const noteDiv = document.createElement('div');
        noteDiv.className = 'note-card';
        noteDiv.innerHTML = `
            <div class="note-title">${item.title}</div>
            <div class="note-time">${item.createTime}</div>
            <div class="note-content">${item.content}</div>
            <div class="note-operate">
                <button class="edit-small-btn" data-idx="${idx}">编辑</button>
                <button class="del-small-btn" data-idx="${idx}">删除</button>
            </div>`;
        noteListWrap.appendChild(noteDiv);
    })
    // 编辑删除绑定
    document.querySelectorAll('.edit-small-btn').forEach(btn=>{
        btn.addEventListener('click',(e)=>{
            const idx = Number(e.target.dataset.idx);
            const targetNote = noteListData[idx];
            titleInput.value = targetNote.title;
            contentInput.value = targetNote.content;
            editIndexInput.value = idx;
            editMask.style.display = 'flex';
        })
    })
    document.querySelectorAll('.del-small-btn').forEach(btn=>{
        btn.addEventListener('click',(e)=>{
            const idx = Number(e.target.dataset.idx);
            if(confirm('确认删除这条笔记？')){
                noteListData.splice(idx,1);
                saveNoteLocal();
                renderNoteList();
            }
        })
    })
}
// 保存本地
function saveNoteLocal(){
    localStorage.setItem(LOCAL_STORE_NOTE_KEY,JSON.stringify(noteListData));
}
// 状态提示
function updateSyncTip(text){
    syncStatusText.innerText = text;
}

// 新建笔记点击
addNoteBtn.addEventListener('click',()=>{
    titleInput.value = '';
    contentInput.value = '';
    editIndexInput.value = '';
    editMask.style.display = 'flex';
})
// 关闭编辑弹窗
closeEditBtn.addEventListener('click',()=>{
    editMask.style.display = 'none';
})
// 保存笔记
saveLocalBtn.addEventListener('click',()=>{
    const titleVal = titleInput.value.trim();
    const contentVal = contentInput.value.trim();
    if(!titleVal && !contentVal){
        alert('标题或内容至少填写一项');
        return;
    }
    const nowTime = new Date().toLocaleString();
    const editIdx = editIndexInput.value;
    if(editIdx !== ''){
        noteListData[editIdx].title = titleVal;
        noteListData[editIdx].content = contentVal;
        noteListData[editIdx].updateTime = nowTime;
    }else{
        noteListData.unshift({
            title:titleVal,
            content:contentVal,
            createTime:nowTime
        })
    }
    saveNoteLocal();
    renderNoteList();
    editMask.style.display = 'none';
    updateSyncTip('本地保存完成，可执行云同步上传');
})
// 手动导出
exportBackupBtn.addEventListener('click',()=>{
    const backupStr = JSON.stringify(noteListData,null,2);
    navigator.clipboard.writeText(backupStr).then(()=>{
        alert('✅备份文本已复制到剪贴板，可保存或上传坚果云网页');
    }).catch(()=>{
        prompt('手动复制下方备份文本：',backupStr);
    })
})
// 打开导入弹窗
importBtn.addEventListener('click',()=>{
    pasteBackupInput.value = '';
    importMask.style.display = 'flex';
})
closeImportBtn.addEventListener('click',()=>{
    importMask.style.display = 'none';
})
// 确认导入
confirmImportBtn.addEventListener('click',()=>{
    const pasteStr = pasteBackupInput.value.trim();
    if(!pasteStr){
        alert('请粘贴备份JSON文本');
        return;
    }
    try{
        const importArr = JSON.parse(pasteStr);
        if(Array.isArray(importArr)){
            if(confirm('⚠️导入将覆盖当前所有本地笔记，确认继续？')){
                noteListData = importArr;
                saveNoteLocal();
                renderNoteList();
                importMask.style.display = 'none';
                alert('✅导入成功');
                updateSyncTip('手动云端备份导入完成');
            }
        }else{
            alert('备份格式错误，必须为数组JSON');
        }
    }catch(err){
        alert('JSON解析失败：'+err.message);
    }
})
// 打开设置弹窗
openSettingBtn.addEventListener('click',()=>{
    davSettingMask.style.display = 'flex';
})
closeDavSettingBtn.addEventListener('click',()=>{
    davSettingMask.style.display = 'none';
})
// 保存WebDAV配置
saveDavConfigBtn.addEventListener('click',()=>{
    davConfigInfo.url = davUrlInput.value.trim();
    davConfigInfo.user = davUserInput.value.trim();
    davConfigInfo.pwd = davPwdInput.value.trim();
    localStorage.setItem(DAV_CONFIG_STORE_KEY,JSON.stringify(davConfigInfo));
    davSettingMask.style.display = 'none';
    updateSyncTip('坚果云WebDAV账号已保存，联网环境可一键同步');
})
// 暗黑切换
toggleDarkBtn.addEventListener('click',()=>{
    document.body.classList.toggle('dark-mode');
    localStorage.setItem('noteDarkMode',document.body.classList.contains('dark-mode')?'dark':'light';
})
// 打开赞助弹窗
openDonateBtn.addEventListener('click',()=>{
    donateMask.style.display = 'flex';
})
closeDonateBtn.addEventListener('click',()=>{
    donateMask.style.display = 'none';
})
// 一键上传
syncUploadBtn.addEventListener('click',async ()=>{
    if(!davConfigInfo.url || !davConfigInfo.user || !davConfigInfo.pwd){
        alert('请先填写并保存坚果云WebDAV账号信息');
        return;
    }
    try{
        updateSyncTip('正在上传备份至坚果云云端...');
        const davClient = webdav.createClient(davConfigInfo.url,{username:davConfigInfo.user,password:davConfigInfo.pwd});
        const backupJsonStr = JSON.stringify(noteListData,null,2);
        await davClient.putFileContents(DAV_CLOUD_FILE_NAME,backupJsonStr,{contentType:'application/json'});
        updateSyncTip('✅一键上传坚果云云备份成功，云端已更新笔记');
    }catch(err){
        console.error(err);
        updateSyncTip('❌上传失败：'+err.message+'，优先改用手动导出备份');
        alert('上传异常：'+err.message+'，优先改用手动导出备份');
    }
})
// 一键下载
syncDownloadBtn.addEventListener('click',async ()=>{
    if(!davConfigInfo.url || !davConfigInfo.user || !davConfigInfo.pwd){
        alert('请先填写并保存坚果云WebDAV账号信息');
        return;
    }
    if(!confirm('⚠️下载云端笔记将覆盖当前全部本地笔记，确认继续？')) return;
    try{
        updateSyncTip('正在从坚果云下载云端备份笔记...');
        const davClient = webdav.createClient(davConfigInfo.url,{username:davConfigInfo.user,password:davConfigInfo.pwd});
        const fileExist = await davClient.exists(DAV_CLOUD_FILE_NAME);
        if(!fileExist){
            updateSyncTip('云端暂无备份文件，无需下载');
            return;
        }
        const cloudText = await davClient.getFileContents(DAV_CLOUD_FILE_NAME,{format:'text'});
        const cloudNoteArr = JSON.parse(cloudText);
        noteListData = cloudNoteArr;
        saveNoteLocal();
        renderNoteList();
        updateSyncTip('✅云端笔记下载恢复成功，本地已同步更新');
    }catch(err){
        console.error(err);
        updateSyncTip('❌下载失败：'+err.message+'，优先改用手动导入恢复');
        alert('下载异常：'+err.message+'，优先改用手动导入恢复');
    }
})

// 初始化渲染列表
renderNoteList();
</script>
</body>
</html>
